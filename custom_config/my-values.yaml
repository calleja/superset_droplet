# Apache Superset Helm overrides — MicroK8s, resource-constrained droplet (2 vCPU / 4 GiB)
# Chart: superset/superset 0.15.4, app 5.0.0
# Subcharts: bitnami postgresql 16.7.27 (image tag 14.17.0), redis 17.9.4 (image tag 7.0.10)
#
# Secrets are NOT stored here. They are managed via SOPS + age.
# See environments/dev/secrets.example.yaml and INSTALL_microk8s.md.
#
# Install (snap MicroK8s):
#   microk8s helm repo add superset https://apache.github.io/superset
#   microk8s helm repo update
#   microk8s kubectl create namespace superset --dry-run=client -o yaml | microk8s kubectl apply -f -
#   microk8s helm secrets upgrade --install superset superset/superset \
#     --version 0.15.4 -n superset --create-namespace \
#     -f custom_config/my-values.yaml \
#     -f custom_config/environments/dev/secrets.yaml \
#     --wait --timeout 15m
#
# UI (ClusterIP):
#   microk8s kubectl port-forward -n superset svc/superset 8088:8088

image:
  tag: "5.0.0"

# ---------------------------------------------------------------------------
# Metadata DB: PostgreSQL (chart-managed)
# ---------------------------------------------------------------------------
# Image fix: versioned Bitnami tags are no longer published under docker.io/bitnami/*;
# they are available under docker.io/bitnamilegacy/* on Docker Hub.
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "14.17.0-debian-12-r3"
  auth:
    username: superset
    password: superset
    database: superset
  primary:
    resources:
      limits:
        cpu: 500m
        memory: 768Mi
      requests:
        cpu: 150m
        memory: 384Mi
    extendedConfiguration: |
      shared_buffers = 64MB
      effective_cache_size = 192MB
      work_mem = 4MB
      maintenance_work_mem = 32MB
      max_connections = 50

# ---------------------------------------------------------------------------
# Cache / async results broker: Redis (chart-managed)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: "7.0.10-debian-11-r4"
  master:
    extraFlags:
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 192Mi

# ---------------------------------------------------------------------------
# Superset web (gunicorn)
# ---------------------------------------------------------------------------
supersetNode:
  replicas:
    enabled: true
    replicaCount: 1
  connections:
    db_type: postgresql
    db_host: "{{ .Release.Name }}-postgresql"
    db_port: "5432"
    db_user: superset
    db_pass: superset
    db_name: superset
  command:
    - "/bin/sh"
    - "-c"
    - ". {{ .Values.configMountPath }}/superset_bootstrap.sh; /usr/bin/run-server.sh"
  initContainers:
    - name: wait-for-postgres
      image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
      imagePullPolicy: "{{ .Values.initImage.pullPolicy }}"
      envFrom:
        - secretRef:
            name: "{{ tpl .Values.envFromSecret . }}"
      command:
        - /bin/sh
        - -c
        - dockerize -wait "tcp://$DB_HOST:$DB_PORT" -timeout 120s
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
  resources:
    limits:
      cpu: "1"
      memory: 1280Mi
    requests:
      cpu: 300m
      memory: 512Mi

# ---------------------------------------------------------------------------
# Celery worker
# ---------------------------------------------------------------------------
supersetWorker:
  replicas:
    enabled: true
    replicaCount: 1
  command:
    - "/bin/sh"
    - "-c"
    - ". {{ .Values.configMountPath }}/superset_bootstrap.sh; celery --app=superset.tasks.celery_app:app worker --concurrency 1"
  initContainers:
    - name: wait-for-postgres-redis
      image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
      imagePullPolicy: "{{ .Values.initImage.pullPolicy }}"
      envFrom:
        - secretRef:
            name: "{{ tpl .Values.envFromSecret . }}"
      command:
        - /bin/sh
        - -c
        - dockerize -wait "tcp://$DB_HOST:$DB_PORT" -wait "tcp://$REDIS_HOST:$REDIS_PORT" -timeout 120s
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
  resources:
    limits:
      cpu: 500m
      memory: 768Mi
    requests:
      cpu: 150m
      memory: 384Mi

# ---------------------------------------------------------------------------
# Init job (db migrations + admin creation)
# ---------------------------------------------------------------------------
init:
  enabled: true
  loadExamples: false
  createAdmin: true
  resources:
    limits:
      cpu: "1"
      memory: 1536Mi
    requests:
      cpu: 100m
      memory: 256Mi
  initContainers:
    - name: wait-for-postgres
      image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
      imagePullPolicy: "{{ .Values.initImage.pullPolicy }}"
      envFrom:
        - secretRef:
            name: "{{ tpl .Values.envFromSecret . }}"
      command:
        - /bin/sh
        - -c
        - dockerize -wait "tcp://$DB_HOST:$DB_PORT" -timeout 120s
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8088

# ---------------------------------------------------------------------------
# Bootstrap: install Python drivers absent from the Superset 5.0.0 image venv.
#   - psycopg2-binary: metadata DB (postgresql+psycopg2:// SQLAlchemy URI)
#   - mysql-connector-python: source DB connections via mysql+mysqlconnector://
#   - pymysql: shim for engine spec paths that still `import MySQLdb`
# ---------------------------------------------------------------------------
bootstrapScript: |
  set -e
  uv pip install --no-cache-dir \
    "mysql-connector-python>=8.0.0,<9.0.0" \
    "psycopg2-binary" \
    "pymysql"
  if [ ! -f ~/bootstrap ]; then echo "Running Superset with uid {{ .Values.runAsUser }}" > ~/bootstrap; fi

# ---------------------------------------------------------------------------
# Non-sensitive environment (source MySQL connection hints)
# ---------------------------------------------------------------------------
# MicroK8s: pods cannot reach 127.0.0.1 on the host VM.
# Set SOURCE_MYSQL_HOST to the VM's private/LAN IP (e.g. the DigitalOcean
# private IP visible under Networking → Private IP, typically 10.x.x.x).
# MySQL must also listen on that IP — set bind-address = 0.0.0.0 (or the
# private IP) in /etc/mysql/mysql.conf.d/mysqld.cnf and allow the pod CIDR
# (microk8s default: 10.1.0.0/16) through ufw / iptables.
extraEnv:
  SERVER_WORKER_AMOUNT: "1"
  SERVER_THREADS_AMOUNT: "8"
  SOURCE_MYSQL_HOST: "CHANGEME_VM_PRIVATE_IP"   # e.g. 10.114.0.2 — see README.md
  SOURCE_MYSQL_PORT: "3306"
  SOURCE_MYSQL_DATABASE: "membership_ard"
  SOURCE_MYSQL_USER: "CHANGEME_MYSQL_USER"

# extraSecretEnv is intentionally absent here.
# SUPERSET_SECRET_KEY and SOURCE_MYSQL_PASSWORD are injected at install time
# from the SOPS-encrypted file: environments/dev/secrets.yaml
# See INSTALL_microk8s.md for the full workflow.

# ---------------------------------------------------------------------------
# Config overrides
# ---------------------------------------------------------------------------
configOverrides:
  pymysql_as_mysqldb: |
    # Superset MySQL engine spec imports MySQLdb in some paths; image ships no mysqlclient.
    # pymysql is installed in bootstrapScript and registered here as a drop-in replacement.
    try:
      import pymysql
      pymysql.install_as_MySQLdb()
    except Exception:
      pass
  secret: |
    SECRET_KEY = os.environ["SUPERSET_SECRET_KEY"]
  source_mysql_uri_hint: |
    # SQLAlchemy URI template — paste this into the Superset UI (Settings > Databases > + Database):
    # mysql+mysqlconnector://{SOURCE_MYSQL_USER}:{SOURCE_MYSQL_PASSWORD}@{SOURCE_MYSQL_HOST}:{SOURCE_MYSQL_PORT}/{SOURCE_MYSQL_DATABASE}

# ---------------------------------------------------------------------------
# Optional components — keep off on a 2 vCPU / 4 GiB node unless needed
# ---------------------------------------------------------------------------
supersetCeleryBeat:
  enabled: false

supersetCeleryFlower:
  enabled: false

supersetWebsockets:
  enabled: false
