# Superset secret values — dev environment template
#
# HOW TO USE:
#   1. Copy this file to secrets.yaml in the same directory:
#        cp secrets.example.yaml secrets.yaml
#   2. Fill in real values below.
#   3. Encrypt in place with SOPS (requires .sops.yaml configured):
#        sops --encrypt --in-place secrets.yaml
#   4. NEVER commit the unencrypted secrets.yaml to version control.
#      The encrypted file (ENC[...] blocks) is safe to commit.
#
# Generate a strong SECRET_KEY:
#   openssl rand -base64 42
#
# These values are passed as a second -f layer at helm install time:
#   microk8s helm secrets upgrade --install superset superset/superset \
#     -f custom_config/my-values.yaml \
#     -f custom_config/environments/dev/secrets.yaml \
#     ...
#
# All three keys below are injected as Kubernetes Secret (extraSecretEnv),
# not ConfigMap — they are never visible in plaintext inside the cluster.

extraSecretEnv:
  # Flask/Superset signing key. Used to sign sessions and tokens.
  # Generate with: openssl rand -base64 42
  SUPERSET_SECRET_KEY: "REPLACE_with_output_of_openssl_rand_base64_42"

  # Credentials for the source MySQL database on the VM.
  # HOST, PORT, and DATABASE remain in my-values.yaml (non-sensitive).
  SOURCE_MYSQL_USER: "REPLACE_with_mysql_username"
  SOURCE_MYSQL_PASSWORD: "REPLACE_with_mysql_password"
